<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cross-origin iframe test — ASOS</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 24px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 20px;
      }
      iframe {
        width: 100%;
        height: 800px;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <h1>Cross-origin iframe test — ASOS</h1>
    <!-- framing: target returned a 3xx redirect at probe time - follows to the final URL; framing subject to the redirected page's headers. -->
    <iframe
      id="cross-frame"
      title="ASOS (cross-origin)"
      src="https://www.asos.com/"
    ></iframe>
  </body>
</html>
