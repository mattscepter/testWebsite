<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cross-origin iframe test — Walmart</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 24px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 20px;
      }
      iframe {
        width: 100%;
        height: 800px;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <h1>Cross-origin iframe test — Walmart</h1>
    <!-- framing: target sends X-Frame-Options DENY/SAMEORIGIN or CSP frame-ancestors self/none - renders blank unless scanned through a header-stripping proxy (jackproxy). -->
    <iframe
      id="cross-frame"
      title="Walmart (cross-origin)"
      src="https://www.walmart.com/"
    ></iframe>
  </body>
</html>
