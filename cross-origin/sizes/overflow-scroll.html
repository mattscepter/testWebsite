<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XO size — iframe inside overflow:auto container</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 16px; color: #1a1a1a; }
      h1 { font-size: 18px; }
      iframe { border: 1px solid #ccc; }
      .scroller { height: 300px; overflow: auto; border: 2px solid rebeccapurple; }
      #cross-frame { width: 100%; height: 2500px; }
    </style>
  </head>
  <body>
    <h1>Cross-origin size case — iframe inside overflow:auto container</h1>
    <div class="scroller">
    <iframe id="cross-frame" title="AI Type C content (cross-origin)" src="https://browserstack.github.io/bs-a11y-checks/all/typec.html"></iframe>
    </div>
  </body>
</html>
