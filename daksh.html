<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --text:#e6e9ef; --muted:#9aa3b2; --accent:#4f8cff;
    --strong:#2ecc71; --good:#4f8cff; --maybe:#f4b740; --low:#7a8290;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header{padding:24px 28px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#13161d,#0f1115)}
  h1{margin:0 0 4px;font-size:20px}
  .sub{color:var(--muted);font-size:13px}
  .stats{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:13px}
  .stat b{font-size:18px;display:block}
  .controls{position:sticky;top:0;z-index:5;display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    padding:14px 28px;background:rgba(15,17,21,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  input,select{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px}
  input#q{min-width:240px;flex:1}
  .chip{cursor:pointer;user-select:none;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--panel);font-size:12px;color:var(--muted)}

  .chip.Strong.active{background:var(--strong)} .chip.Good.active{background:var(--good)}
  .chip.Maybe.active{background:var(--maybe);color:#222} .chip.Low.active{background:var(--low)}
  label.tog{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer}
  main{padding:20px 28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
  .card.Strong{border-left-color:var(--strong)} .card.Good{border-left-color:var(--good)}
  .card.Maybe{border-left-color:var(--maybe)} .card.Low{border-left-color:var(--low)}
  .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .title{font-weight:600;font-size:15px;line-height:1.3}
  .company{color:var(--muted);font-size:13px}
  .badge{flex:none;font-weight:700;font-size:15px;width:46px;height:46px;border-radius:10px;display:grid;place-items:center;background:var(--panel2);border:1px solid var(--line)}
  .badge.Strong{color:var(--strong)} .badge.Good{color:var(--good)} .badge.Maybe{color:var(--maybe)} .badge.Low{color:var(--low)}
  .tags{display:flex;flex-wrap:wrap;gap:6px}

  .tag.fit-yes{color:var(--strong)} .tag.fit-over,.tag.fit-under-leveled{color:var(--maybe)}
  .why{font-size:12px;color:var(--muted)}
  .bars{display:flex;gap:4px;margin-top:2px}
  .bar{height:5px;border-radius:3px;background:var(--panel2);position:relative;flex:1;overflow:hidden}
  .bar > i{position:absolute;left:0;top:0;bottom:0;background:var(--accent);display:block}
  .actions{display:flex;gap:8px;margin-top:4px}
  a.btn,.btn{text-decoration:none;font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);color:var(--text);background:var(--panel2);cursor:pointer}
  a.btn.primary{background:var(--accent);border-color:transparent;color:#fff}
  .desc{display:none;font-size:12.5px;color:#cbd2dd;white-space:pre-wrap;border-top:1px solid var(--line);padding-top:8px;margin-top:2px;max-height:340px;overflow:auto}
  .desc.open{display:block}
  .pills{display:flex;flex-wrap:wrap;gap:5px}
  .pill{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--line)}
  .pill.high{color:var(--strong);border-color:rgba(46,204,113,.4);background:rgba(46,204,113,.08)}
  .pill.flag{color:var(--maybe);border-color:rgba(244,183,64,.4);background:rgba(244,183,64,.08)}
  .badge.Unscored{color:var(--muted)} .chip.Unscored.active{background:var(--low)} .card.Unscored{border-left-color:var(--low)}
  .card.opened{opacity:.62}
  .card.opened .title::after{content:"✓ Opened";margin-left:8px;font-size:10px;font-weight:600;color:var(--strong);border:1px solid rgba(46,204,113,.4);background:rgba(46,204,113,.1);padding:1px 6px;border-radius:10px;vertical-align:middle;white-space:nowrap}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:60px}
  .count{color:var(--muted);font-size:13px;margin-left:auto}
</style>
</head>

const STATIC = true;
const TIERS = ["Strong","Good","Maybe","Low"];
const active = new Set(["Strong","Good","Maybe","Low","Unscored"]);
const el = (id)=>document.getElementById(id);

// Opened-status tracking. Source of truth is the server (data/opened.json) when
// served via npm run serve; falls back to localStorage if opened from file://.
let OPENED = {};
const LS_KEY = "ljs-opened";
function loadLocalOpened(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||"{}"); }catch{ return {}; } }
function markOpened(id, anchor){
  if(!OPENED[id]) OPENED[id] = new Date().toISOString();
  // reflect immediately on the card without a full re-render
  if(anchor){ const card=anchor.closest(".card"); if(card) card.classList.add("opened"); }
  // persist: server first, localStorage always (fallback / file:// mode)
  const ls=loadLocalOpened(); ls[id]=OPENED[id]; try{ localStorage.setItem(LS_KEY,JSON.stringify(ls)); }catch{}
  if(!STATIC) fetch("/api/open?id="+encodeURIComponent(id)).catch(()=>{});
}

// stats
const counts = {Strong:0,Good:0,Maybe:0,Low:0};
JOBS.forEach(j=>{ if(counts[j.tier]!=null) counts[j.tier]++; });
el("stats").innerHTML = TIERS.map(t=>`<div class="stat"><b style="color:var(--${t.toLowerCase()})">${counts[t]}</b>${t}</div>`).join("")
  + `<div class="stat"><b>${JOBS.length}</b>Total</div>`;

// location dropdown (cities)
const locs = [...new Set(JOBS.map(j=>cityOf(j.location)).filter(Boolean))].sort();
el("loc").innerHTML += locs.map(l=>`<option value="${l}">${l}</option>`).join("");
function cityOf(s){ s=(s||"").toLowerCase();
  if(s.includes("mumbai"))return "Mumbai"; if(s.includes("bengaluru")||s.includes("bangalore"))return "Bangalore";
  if(s.includes("hyderabad"))return "Hyderabad"; if(s.includes("remote"))return "Remote";
  return (s.split(",")[0]||"").replace(/\b\w/g,c=>c.toUpperCase()).trim(); }

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function render(){
  const q = el("q").value.toLowerCase();
  const loc = el("loc").value;
  const sort = el("sort").value;
  const fin = el("fintech").checked;
  let list = JOBS.filter(j=>active.has(j.tier))
    .filter(j=> !loc || cityOf(j.location)===loc)
    .filter(j=> !fin || /fin-?tech|financial|payments|bank|lending|invest|wealth|broking|insurance/i.test(j.industry+" "+j.why+" "+j.company))
    .filter(j=> !q || (j.title+j.company+j.industry+j.description).toLowerCase().includes(q));
  list.sort((a,b)=> sort==="posted" ? (b.posted||"").localeCompare(a.posted||"")
    : sort==="company" ? a.company.localeCompare(b.company)
    : sort==="applicants" ? (a.applicants??1e9)-(b.applicants??1e9)
    : (b.score??-1)-(a.score??-1));

  el("count").textContent = list.length + " shown";
  const grid = el("grid");
  if(!list.length){ grid.innerHTML='<div class="empty">No jobs match these filters.</div>'; return; }
  const fmt=(n)=> n==null?"":(n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(0)+"k":n);
  grid.innerHTML = list.map((j,i)=>{
    const flags=(j.redFlags||[]).map(f=>`<span class="pill flag">⚠ ${esc(f)}</span>`).join("");
    const highs=(j.highlights||[]).map(f=>`<span class="pill high">✓ ${esc(f)}</span>`).join("");
    return `<div class="card ${j.tier}${OPENED[j.jobId]?" opened":""}">
      <div class="top">
        <div><div class="title">${esc(j.title)}</div><div class="company">${esc(j.company)}${j.industry?` · ${esc(j.industry)}`:""}</div></div>
        <div class="badge ${j.tier}">${j.score==null?"–":j.score}</div>
      </div>
      <div class="tags">
        <span class="tag">📍 ${esc(cityOf(j.location))}</span>
        ${j.reqYears&&j.reqYears!=="unspecified"?`<span class="tag fit-${j.fitYears}">${esc(j.reqYears)} yrs · ${esc(j.fitYears||"")}</span>`:""}
        ${j.applicants!=null?`<span class="tag">👥 ${j.applicants} applicants</span>`:""}
        ${j.followers!=null?`<span class="tag">★ ${fmt(j.followers)} followers</span>`:""}
        ${j.employees!=null?`<span class="tag">🏢 ${fmt(j.employees)} employees</span>`:""}
        ${j.type?`<span class="tag">${esc(j.type)}</span>`:""}
        ${j.posted?`<span class="tag">${esc(j.posted)}</span>`:""}
      </div>
      <div class="why">${esc(j.why)}</div>
      ${(highs||flags)?`<div class="pills">${highs}${flags}</div>`:""}
      <div class="actions">
        <a class="btn primary" href="${esc(j.url)}" target="_blank" rel="noopener" data-open="${esc(j.jobId)}">Open on LinkedIn ↗</a>
        ${j.description?`<button class="btn" data-i="${i}">Description</button>`:""}
        ${j.companyDesc?`<button class="btn" data-c="${i}">Company</button>`:""}
      </div>
      <div class="desc" id="desc-${i}">${esc(j.description)}</div>
      ${j.companyDesc?`<div class="desc" id="comp-${i}"><b>${esc(j.company)}</b>${j.hq?` · ${esc(j.hq)}`:""}\n\n${esc(j.companyDesc)}</div>`:""}
    </div>`;
  }).join("");
  grid.querySelectorAll("button[data-c]").forEach(btn=>btn.onclick=()=>{
    el("comp-"+btn.dataset.c).classList.toggle("open");
  });
  // Mark a job opened when its LinkedIn link is clicked (record server-side + reflect on card).
  grid.querySelectorAll("a[data-open]").forEach(a=>a.addEventListener("click",()=>markOpened(a.dataset.open,a)));
  grid.querySelectorAll("button[data-i]").forEach(btn=>btn.onclick=()=>{
    el("desc-"+btn.dataset.i).classList.toggle("open");
  });
}

document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
  const t=c.dataset.tier;
  if(active.has(t)){active.delete(t);c.classList.remove("active");}else{active.add(t);c.classList.add("active");}
  render();
});
["q","loc","sort","fintech"].forEach(id=>el(id).addEventListener("input",render));

// Initial paint from localStorage, then reconcile with the server's opened.json.
OPENED = loadLocalOpened();
render();
if(!STATIC){
  fetch("/api/opened").then(r=>r.ok?r.json():{}).then(server=>{
    OPENED = Object.assign({}, OPENED, server);
    render();
  }).catch(()=>{});
}
</script>
</body>
</html>
