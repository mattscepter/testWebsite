<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>No body tag</title>
  <!--
    Edge case: HTML is always parsed with a synthesized <body>, so a
    head-only document still has document.body. To genuinely make
    querySelector('body') null at scan time, we remove the body element
    once it exists (mirrors SPA/teardown scripts that detach the body).
  -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (document.body) document.body.remove();
    });
  </script>
</head>
</html>
