<?xml version="1.0" encoding="UTF-8"?>
<!--
  Edge case: a standalone SVG document (XML, image/svg+xml).
  Root element is <svg>; there is no HTML <body> element, so
  querySelector('body') returns null.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="150" viewBox="0 0 300 150">
  <rect width="300" height="150" fill="#0a84ff"/>
  <text x="20" y="80" font-family="sans-serif" font-size="18" fill="#ffffff">
    SVG document - no HTML body
  </text>
</svg>
